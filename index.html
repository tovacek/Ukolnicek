    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Default Theme (Playful) - RGB values for Tailwind opacity support */
        --brand-yellow: 255 209 102; /* #FFD166 */
        --brand-blue: 17 138 178;    /* #118AB2 */
        --brand-green: 6 214 160;    /* #06D6A0 */
        --brand-red: 239 71 111;     /* #EF476F */
        --brand-dark: 7 59 76;       /* #073B4C */
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Fredoka', sans-serif;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Fredoka', 'sans-serif'],
            },
            colors: {
              'brand-yellow': 'rgb(var(--brand-yellow) / <alpha-value>)',
              'brand-blue': 'rgb(var(--brand-blue) / <alpha-value>)',
              'brand-green': 'rgb(var(--brand-green) / <alpha-value>)',
              'brand-red': 'rgb(var(--brand-red) / <alpha-value>)',
              'brand-dark': 'rgb(var(--brand-dark) / <alpha-value>)',
            }
          }
        }
      }
    </script>
